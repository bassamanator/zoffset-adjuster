name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: zoffset-adjuster
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: zoffset-adjuster.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: zoffset-adjuster
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: zoffset-adjuster

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.target }}-${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.target }}-${{ matrix.binary }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.target }}-${{ matrix.binary }}
          generate_release_notes: true
